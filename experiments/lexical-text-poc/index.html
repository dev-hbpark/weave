<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexical Text PoC — weave DR-015</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, "Noto Sans KR", sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #f6f7f9;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      .note {
        font-size: 13px;
        color: #4a5568;
        margin-bottom: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .editor {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 16px;
        min-height: 220px;
      }
      .editor[data-empty="true"]::before {
        content: "여기에 입력...";
        color: #9ca3af;
        position: absolute;
        pointer-events: none;
      }
      .editor-shell {
        position: relative;
      }
      .editor-label {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 8px;
      }
      .toolbar {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .toolbar button {
        padding: 4px 10px;
        font-size: 12px;
        border: 1px solid #d1d5db;
        background: white;
        border-radius: 4px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f3f4f6;
      }
      .controls {
        margin: 16px 0;
        display: flex;
        gap: 8px;
      }
      .controls button {
        padding: 6px 14px;
        font-size: 13px;
        border: 1px solid #2563eb;
        background: #3b82f6;
        color: white;
        border-radius: 4px;
        cursor: pointer;
      }
      .controls button:hover {
        background: #2563eb;
      }
      .stats {
        margin-top: 24px;
        font-family: ui-monospace, "JetBrains Mono", monospace;
        font-size: 12px;
        color: #374151;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
